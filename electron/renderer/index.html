<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Veille Techno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #1e1e2e;
      --surface:  #2a2a3e;
      --border:   rgba(255,255,255,0.06);
      --accent:   #f5a623;
      --text:     #cdd6f4;
      --subtext:  #7f849c;
      --success:  #a6e3a1;
      --error:    #f38ba8;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Barre de titre ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .titlebar .title {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }

    .titlebar .week {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      background: rgba(245,166,35,0.12);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .titlebar .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 14px;
      padding: 3px 7px;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .titlebar .close-btn:hover { background: rgba(243,139,168,0.15); color: var(--error); }

    /* ── Zone de contenu ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface) transparent;
    }

    .empty-state {
      color: var(--subtext);
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
      margin-top: 50px;
    }
    .empty-state .hint {
      margin-top: 12px;
      font-size: 11px;
      opacity: 0.6;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }

    .articles { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .article-item {
      background: var(--surface);
      border-left: 2px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .article-title { font-weight: 600; }
    .article-desc  { color: var(--subtext); margin-top: 1px; }

    /* ── Pied de page ── */
    .footer {
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .run-btn {
      width: 100%;
      background: var(--accent);
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .run-btn:hover:not(:disabled) { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: var(--subtext);
      text-align: center;
      min-height: 14px;
      transition: color 0.2s;
    }
    .status.running { color: var(--accent); }
    .status.success { color: var(--success); }
    .status.error   { color: var(--error); }
  </style>
</head>
<body>

  <div class="titlebar">
    <span>🔍</span>
    <span class="title">Veille Techno</span>
    <span class="week" id="weekLabel">—</span>
    <button class="close-btn" id="closeBtn" title="Réduire">✕</button>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="emptyState">
      Aucun digest disponible.
      <div class="hint">Cliquez sur « Lancer la veille »<br>pour générer le premier rapport.</div>
    </div>
    <div id="articlesList" style="display:none">
      <div class="section-label">🔥 Incontournables</div>
      <ul class="articles" id="articles"></ul>
    </div>
  </div>

  <div class="footer">
    <button class="run-btn" id="runBtn">⚡ Lancer la veille</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const weekLabelEl  = document.getElementById('weekLabel');
    const emptyStateEl = document.getElementById('emptyState');
    const articlesListEl = document.getElementById('articlesList');
    const articlesEl   = document.getElementById('articles');
    const runBtnEl     = document.getElementById('runBtn');
    const statusEl     = document.getElementById('status');
    const closeBtnEl   = document.getElementById('closeBtn');

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function parseBullets(markdown) {
      return markdown.split('\n')
        .filter(l => l.trim().startsWith('-'))
        .map(l => {
          const clean = l.replace(/^[\s\-]+/, '').trim();
          const m = clean.match(/^\*\*(.+?)\*\*\s*[—–\-]\s*(.+)$/);
          return m ? { title: m[1], desc: m[2] } : { title: clean, desc: '' };
        })
        .filter(a => a.title);
    }

    window.veille.onContent(({ incontournables, weekLabel }) => {
      if (!incontournables) {
        emptyStateEl.style.display = 'block';
        articlesListEl.style.display = 'none';
        weekLabelEl.textContent = '—';
        return;
      }

      weekLabelEl.textContent = weekLabel || '—';
      const items = parseBullets(incontournables);

      articlesEl.innerHTML = items.map(a => `
        <li class="article-item">
          <div class="article-title">${esc(a.title)}</div>
          ${a.desc ? `<div class="article-desc">${esc(a.desc)}</div>` : ''}
        </li>
      `).join('');

      emptyStateEl.style.display = 'none';
      articlesListEl.style.display = 'block';
    });

    window.veille.onStatus(({ running, success }) => {
      runBtnEl.disabled = running;
      if (running) {
        runBtnEl.textContent = '⏳ En cours…';
        statusEl.textContent = 'Pipeline en cours d\'exécution…';
        statusEl.className = 'status running';
      } else {
        runBtnEl.textContent = '⚡ Lancer la veille';
        if (success === true) {
          statusEl.textContent = '✓ Digest mis à jour';
          statusEl.className = 'status success';
        } else if (success === false) {
          statusEl.textContent = '✗ Erreur — voir la console';
          statusEl.className = 'status error';
        } else {
          statusEl.textContent = '';
          statusEl.className = 'status';
        }
      }
    });

    runBtnEl.addEventListener('click', () => window.veille.runPipeline());
    closeBtnEl.addEventListener('click', () => window.veille.closeWindow());

    window.veille.getLatest();
  </script>
</body>
</html>
