<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Veille Techno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #1e1e2e;
      --surface:  #2a2a3e;
      --border:   rgba(255,255,255,0.06);
      --accent:   #f5a623;
      --text:     #cdd6f4;
      --subtext:  #7f849c;
      --success:  #a6e3a1;
      --error:    #f38ba8;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Barre de titre ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .titlebar .title {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }

    .titlebar .week {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      background: rgba(245,166,35,0.12);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .titlebar .collapse-btn,
    .titlebar .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 14px;
      padding: 3px 7px;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .titlebar .collapse-btn:hover { background: rgba(166,227,161,0.15); color: var(--success); }
    .titlebar .close-btn:hover    { background: rgba(243,139,168,0.15); color: var(--error); }

    /* ── Zone de contenu ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface) transparent;
    }

    .empty-state {
      color: var(--subtext);
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
      margin-top: 50px;
    }
    .empty-state .hint {
      margin-top: 12px;
      font-size: 11px;
      opacity: 0.6;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }

    .articles { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .article-item {
      background: var(--surface);
      border-left: 2px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .article-title { font-weight: 600; }
    .article-desc  { color: var(--subtext); margin-top: 1px; }

    .action-row {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }

    .wiki-link, .translate-link {
      flex: 1;
      background: none;
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 6px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .wiki-link:hover, .translate-link:hover { background: rgba(245,166,35,0.08); }

    /* ── Pied de page ── */
    .footer {
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .run-btn {
      width: 100%;
      background: var(--accent);
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .run-btn:hover:not(:disabled) { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: var(--subtext);
      text-align: center;
      min-height: 14px;
      transition: color 0.2s;
    }
    .status.running { color: var(--accent); }
    .status.success { color: var(--success); }
    .status.error   { color: var(--error); }
  </style>
</head>
<body>

  <div class="titlebar">
    <span>🔍</span>
    <span class="title">Veille Techno</span>
    <span class="week" id="weekLabel">—</span>
    <button class="collapse-btn" id="collapseBtn" title="Réduire">−</button>
    <button class="close-btn" id="closeBtn" title="Masquer dans le systray">✕</button>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="emptyState">
      Aucun digest disponible.
      <div class="hint">Cliquez sur « Lancer la veille »<br>pour générer le premier rapport.</div>
    </div>
    <div id="articlesList" style="display:none">
      <div class="section-label" id="sectionLabel">🔥 À retenir</div>
      <ul class="articles" id="articles"></ul>
      <div class="action-row" id="actionRow" style="display:none">
        <button class="wiki-link" id="wikiLink" style="display:none">↗ Digest complet</button>
        <button class="translate-link" id="translateLink" style="display:none">🇫🇷 Version FR</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="run-btn" id="runBtn">⚡ Lancer la veille</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const weekLabelEl    = document.getElementById('weekLabel');
    const emptyStateEl   = document.getElementById('emptyState');
    const articlesListEl = document.getElementById('articlesList');
    const articlesEl     = document.getElementById('articles');
    const sectionLabelEl = document.getElementById('sectionLabel');
    const actionRowEl    = document.getElementById('actionRow');
    const wikiLinkEl     = document.getElementById('wikiLink');
    const translateLinkEl = document.getElementById('translateLink');
    const runBtnEl       = document.getElementById('runBtn');
    const statusEl       = document.getElementById('status');
    const closeBtnEl     = document.getElementById('closeBtn');
    const collapseBtnEl  = document.getElementById('collapseBtn');

    let currentWikiUrl = null;

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function parseBullets(markdown) {
      const lines = markdown.split('\n').map(l => l.trim());
      const items = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.startsWith('**') && !line.startsWith('- **')) continue;
        const clean = line.replace(/^-\s*/, '');
        const titleOnly = clean.match(/^\*\*(.+?)\*\*/);
        if (!titleOnly) continue;
        // Format ancien : **Titre** — desc sur la même ligne
        const sameLine = clean.match(/^\*\*(.+?)\*\*\s*[—–\-]\s*(.+)$/);
        if (sameLine) {
          const d = sameLine[2];
          items.push({ title: sameLine[1], desc: d.slice(0, 120) + (d.length > 120 ? '…' : '') });
          continue;
        }
        // Format nouveau : titre seul, description sur la ligne suivante
        let desc = '';
        for (let j = i + 1; j < lines.length && j <= i + 2; j++) {
          const next = lines[j];
          if (next && !next.startsWith('**') && !next.startsWith('→') && !next.startsWith('#') && !next.startsWith('*')) {
            desc = next.replace(/\*\*/g, '').slice(0, 120) + (next.length > 120 ? '…' : '');
            break;
          }
        }
        items.push({ title: titleOnly[1], desc });
      }
      return items.filter(a => a.title && !a.title.startsWith('#'));
    }

    window.veille.onContent(({ incontournables, weekLabel, wikiUrl, hasTranslation }) => {
      currentWikiUrl = wikiUrl || null;

      if (!incontournables) {
        emptyStateEl.style.display = 'block';
        articlesListEl.style.display = 'none';
        weekLabelEl.textContent = '—';
        return;
      }

      weekLabelEl.textContent = weekLabel || '—';
      const isWeekly = weekLabel && /^\d{4}-W/.test(weekLabel);
      sectionLabelEl.textContent = isWeekly ? '📋 Récap de la semaine' : '🔥 À retenir';
      const items = parseBullets(incontournables);

      articlesEl.innerHTML = items.map(a => `
        <li class="article-item">
          <div class="article-title">${esc(a.title)}</div>
          ${a.desc ? `<div class="article-desc">${esc(a.desc)}</div>` : ''}
        </li>
      `).join('');

      const showWiki = !!wikiUrl;
      const showTranslate = !!hasTranslation;
      wikiLinkEl.style.display = showWiki ? 'flex' : 'none';
      translateLinkEl.style.display = showTranslate ? 'flex' : 'none';
      actionRowEl.style.display = (showWiki || showTranslate) ? 'flex' : 'none';
      emptyStateEl.style.display = 'none';
      articlesListEl.style.display = 'block';
    });

    window.veille.onStatus(({ running, success }) => {
      runBtnEl.disabled = running;
      if (running) {
        runBtnEl.textContent = '⏳ En cours…';
        statusEl.textContent = 'Pipeline en cours d\'exécution…';
        statusEl.className = 'status running';
      } else {
        runBtnEl.textContent = '⚡ Lancer la veille';
        if (success === true) {
          statusEl.textContent = '✓ Digest mis à jour';
          statusEl.className = 'status success';
        } else if (success === false) {
          statusEl.textContent = '✗ Erreur — voir la console';
          statusEl.className = 'status error';
        } else {
          statusEl.textContent = '';
          statusEl.className = 'status';
        }
      }
    });

    runBtnEl.addEventListener('click', () => window.veille.runPipeline());
    closeBtnEl.addEventListener('click', () => window.veille.closeWindow());
    collapseBtnEl.addEventListener('click', () => window.veille.toggleCollapse());
    wikiLinkEl.addEventListener('click', () => { if (currentWikiUrl) window.veille.openUrl(currentWikiUrl); });
    translateLinkEl.addEventListener('click', () => window.veille.openTranslated());

    window.veille.onCollapsed((collapsed) => {
      collapseBtnEl.textContent = collapsed ? '□' : '−';
    });

    window.veille.getLatest();

    // Rendu de l'emoji sur canvas → PNG → icône systray
    (function sendEmojiIcon() {
      const canvas = document.createElement('canvas');
      canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.font = '24px "Segoe UI Emoji", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🔥', 16, 18);
      window.veille.setTrayIcon(canvas.toDataURL('image/png'));
    })();
  </script>
</body>
</html>
